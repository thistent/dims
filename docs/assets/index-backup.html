<!DOCTYPE HTML>
<html>
<head>
  <meta charset="UTF-8">
  <title>DIMS</title>
  <style>body { padding: 0; margin: 0; }</style>
  <script src="assets/main.js"></script>
</head>

<body>
<pre id="elm"></pre>

<script>

var app = Elm.Main.init({
  node: document.getElementById('elm'),
  flags : [
    Date.now(),
    localStorage.getItem('saveState')
  ]
});

if (navigator.storage && navigator.storage.persist)
  navigator.storage.persist().then(granted => {
    if (!granted)
      alert("Warning: Browser storage may not retain state!")
  });

  app.ports.saveState.subscribe(function(data) {
          localStorage.setItem('saveState', JSON.stringify(data));
  });

  app.ports.clearCache.subscribe(function() {
    localStorage.clear();
  });

</script>
</body>
</html>
